<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 52" width="100%" height="100%">
  <defs>
    <!-- Beautiful gradient from blue to mauve -->
    <linearGradient id="btn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89b4fa" />
      <stop offset="100%" stop-color="#cba6f7" />
    </linearGradient>
  </defs>

  <style>
    .shadow { fill: #cba6f7; opacity: 0.25; rx: 20px; }
    .btn-body { fill: url(#btn-grad); rx: 20px; cursor: pointer; }
    .btn-text { font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; fill: #11111b; letter-spacing: 0.2px; }
  </style>

  <!-- Layered Soft Shadow for Depth -->
  <rect x="10" y="10" width="220" height="40" class="shadow" />

  <!-- Main Clickable Button Body -->
  <rect x="6" y="6" width="228" height="40" class="btn-body" />

  <!-- Web Globe Icon -->
  <g stroke="#11111b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(24, 16)">
    <circle cx="10" cy="10" r="8"/>
    <path d="M2 10h16"/>
    <path d="M10 2a15.3 15.3 0 0 1 4 8 15.3 15.3 0 0 1-4 8 15.3 15.3 0 0 1-4-8 15.3 15.3 0 0 1 4-8z"/>
  </g>

  <!-- Button Text -->
  <text x="132" y="30" text-anchor="middle" class="btn-text">Try the Web Interface</text>
</svg>

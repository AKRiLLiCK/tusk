<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252b3b;stop-opacity:1" />
    </linearGradient>

    <!-- Fireball 1: hot gold core -->
    <radialGradient id="fire1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#fff8e0;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ffc844;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#f59a1b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d45e0a;stop-opacity:0.9" />
    </radialGradient>

    <!-- Fireball 2: slightly different hue -->
    <radialGradient id="fire2" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#fffae8;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ffb833;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#e87d15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c44a08;stop-opacity:0.9" />
    </radialGradient>

    <!-- Glow filters -->
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer glow for ambient light -->
    <filter id="ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- Spin trail gradient -->
    <linearGradient id="trail1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="trail2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e87d15;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#e87d15;stop-opacity:0.7" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <rect width="126" height="126" x="1" y="1" rx="25" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>

  <!-- Orbital ring path (implied spin axis) -->
  <ellipse cx="64" cy="64" rx="36" ry="36" fill="none" stroke="#f5a623" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Spin trail — top-right fireball trail (counter-clockwise arc) -->
  <path d="M 82 38 C 98 48, 102 68, 94 84"
        fill="none" stroke="url(#trail1)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 86 42 C 100 50, 104 68, 96 80"
        fill="none" stroke="#ffc844" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

  <!-- Spin trail — bottom-left fireball trail (counter-clockwise arc) -->
  <path d="M 46 90 C 30 80, 26 60, 34 44"
        fill="none" stroke="url(#trail2)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 42 86 C 28 78, 24 60, 32 48"
        fill="none" stroke="#ffb833" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

  <!-- Ambient glow behind fireballs -->
  <circle cx="82" cy="38" r="14" fill="#f5a623" opacity="0.15" filter="url(#ambient)"/>
  <circle cx="46" cy="90" r="14" fill="#e87d15" opacity="0.15" filter="url(#ambient)"/>

  <!-- Fireball 1 — top right position -->
  <circle cx="82" cy="38" r="12" fill="url(#fire1)" filter="url(#glow1)"/>
  <circle cx="80" cy="35" r="5" fill="#fff8e0" opacity="0.6"/>
  <circle cx="79" cy="34" r="2.5" fill="#ffffff" opacity="0.8"/>

  <!-- Fireball 2 — bottom left position -->
  <circle cx="46" cy="90" r="12" fill="url(#fire2)" filter="url(#glow1)"/>
  <circle cx="44" cy="87" r="5" fill="#fffae8" opacity="0.6"/>
  <circle cx="43" cy="86" r="2.5" fill="#ffffff" opacity="0.8"/>

  <!-- Tiny particle sparks along trails -->
  <circle cx="96" cy="76" r="1.5" fill="#ffc844" opacity="0.6"/>
  <circle cx="100" cy="64" r="1" fill="#f5a623" opacity="0.4"/>
  <circle cx="98" cy="54" r="1.2" fill="#ffc844" opacity="0.5"/>

  <circle cx="32" cy="52" r="1.5" fill="#ffb833" opacity="0.6"/>
  <circle cx="28" cy="64" r="1" fill="#e87d15" opacity="0.4"/>
  <circle cx="30" cy="74" r="1.2" fill="#ffb833" opacity="0.5"/>
</svg>
